<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telegram Sender Pro</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">✈</span>
        <div>
          <h1>Telegram Sender Pro</h1>
          <p class="brand-sub">Панель управления</p>
        </div>
      </div>
      <nav class="nav">
        <button data-page="dashboard" class="nav-btn">📊 Дашборд</button>
        <button data-page="accounts" class="nav-btn">👤 Аккаунты</button>
        <button data-page="recipients" class="nav-btn">📋 Получатели</button>
        <button data-page="campaigns" class="nav-btn">📨 Рассылки</button>
        <button data-page="create" class="nav-btn nav-accent">➕ Новая рассылка</button>
        <button data-page="settings" class="nav-btn">⚙️ Настройки</button>
      </nav>
      <p class="api-status" id="api-status">API: …</p>
    </aside>

    <main class="main" id="app">
      <div class="loading">Загрузка…</div>
    </main>
  </div>

  <div id="toasts" class="toasts"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-box card">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <button type="button" id="modal-close" class="btn btn-ghost mt-3">Закрыть</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
